<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Oste — Software Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --bg2: #0f0f14;
    --accent: #8b5cf6;
    --accent2: #a78bfa;
    --gray: #2a2a35;
    --text: #f5f5f5;
    --text-muted: #9ca3af;
    --glass-bg: rgba(15,15,20,0.72);
    --glass-border: rgba(139,92,246,0.22);
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  /* ── CANVAS BACKGROUND ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── BICYCLE SVG ── */
  .bike-bg {
    position: fixed;
    bottom: 12%;
    left: -18%;
    width: 52vw;
    min-width: 340px;
    max-width: 700px;
    opacity: 0.065;
    filter: blur(2.5px) drop-shadow(0 0 18px #8b5cf6);
    animation: bikeFloat 28s ease-in-out infinite alternate;
    z-index: 1;
    pointer-events: none;
  }
  @keyframes bikeFloat {
    0%   { transform: translateX(0)   translateY(0); }
    40%  { transform: translateX(30vw) translateY(-2vh); }
    70%  { transform: translateX(58vw) translateY(1vh); }
    100% { transform: translateX(82vw) translateY(-1vh); }
  }

  /* ── CORNER GLOWS ── */
  .corner-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    z-index: 0;
    pointer-events: none;
  }
  .corner-glow.tl { top: -120px; left: -120px; width: 380px; height: 380px; background: radial-gradient(circle, rgba(139,92,246,0.18) 0%, transparent 70%); }
  .corner-glow.br { bottom: -120px; right: -120px; width: 380px; height: 380px; background: radial-gradient(circle, rgba(139,92,246,0.14) 0%, transparent 70%); }

  /* ── LAYOUT ── */
  .page {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* ── MAIN CARD ── */
  .card {
    width: 100%;
    max-width: 480px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    box-shadow:
      0 0 0 1px rgba(139,92,246,0.10) inset,
      0 0 60px rgba(139,92,246,0.09),
      0 32px 80px rgba(0,0,0,0.7);
    padding: 36px 32px 30px;
    animation: cardIn 0.9s cubic-bezier(.22,1,.36,1) both;
    transition: transform 0.4s cubic-bezier(.22,1,.36,1);
  }
  .card:hover { transform: scale(1.015); }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }
  .avatar-wrap {
    position: relative;
    width: 88px;
    height: 88px;
    flex-shrink: 0;
  }
  .avatar-ring {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #8b5cf6, #a78bfa, #6d28d9, #8b5cf6);
    animation: spin 6s linear infinite;
    filter: blur(0.5px);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .avatar-inner {
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: var(--bg2);
    overflow: hidden;
    z-index: 1;
  }
  .avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }

  .name {
    font-size: 1.55rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.1;
    text-align: center;
  }
  .subtitle {
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-top: 2px;
    text-align: center;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(139,92,246,0.35), transparent);
    margin: 20px 0;
  }

  /* ── TECH STACK ── */
  .stack-label {
    font-size: 0.67rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 14px;
  }
  .stack {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .tech-icon {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(139,92,246,0.07);
    border: 1px solid rgba(139,92,246,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
    transition: transform 0.32s cubic-bezier(.22,1,.36,1), box-shadow 0.32s ease, border-color 0.32s ease;
    box-shadow: 0 2px 14px rgba(0,0,0,0.35);
    position: relative;
  }
  .tech-icon:hover {
    transform: translateY(-6px);
    box-shadow: 0 6px 28px rgba(139,92,246,0.28), 0 2px 14px rgba(0,0,0,0.4);
    border-color: rgba(139,92,246,0.55);
  }
  .tech-icon svg { width: 26px; height: 26px; display: block; }

  /* ── MOTTO ── */
  .motto-wrap {
    height: 32px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 20px 0 4px;
    gap: 0;
  }
  .motto-pipe {
    font-size: 1rem;
    font-weight: 300;
    color: var(--accent2);
    margin-right: 6px;
    flex-shrink: 0;
    text-shadow: 0 0 10px var(--accent);
  }
  .motto-text {
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--text);
    white-space: nowrap;
    animation: mottoSlide 5s cubic-bezier(.4,0,.2,1) infinite;
    text-shadow: 0 0 16px rgba(139,92,246,0.4);
  }
  @keyframes mottoSlide {
    0%   { transform: translateX(-60%); opacity: 0; }
    12%  { transform: translateX(0);    opacity: 1; }
    55%  { transform: translateX(0);    opacity: 1; }
    68%  { transform: translateX(60%);  opacity: 0; }
    100% { transform: translateX(-60%); opacity: 0; }
  }

  /* ── AUDIO PLAYER ── */
  .player {
    margin-top: 22px;
    background: rgba(10,10,16,0.65);
    border: 1px solid rgba(139,92,246,0.16);
    border-radius: 14px;
    padding: 18px 20px 16px;
    box-shadow: 0 0 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .player-meta {
    display: flex;
    align-items: center;
    gap: 13px;
    margin-bottom: 15px;
  }
  .play-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #7c3aed, #8b5cf6);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 0 0 rgba(139,92,246,0.4);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    position: relative;
    outline: none;
  }
  .play-btn:hover { transform: scale(1.07); }
  .play-btn:active { transform: scale(0.94); }
  .play-btn.playing {
    animation: glowPulse 1.8s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(139,92,246,0.4); }
    50%       { box-shadow: 0 0 0 10px rgba(139,92,246,0); }
  }
  .play-btn svg { width: 18px; height: 18px; fill: #fff; transition: opacity 0.2s; }

  .track-info { flex: 1; min-width: 0; }
  .track-title {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-artist {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Progress */
  .progress-wrap {
    position: relative;
    height: 5px;
    background: var(--gray);
    border-radius: 99px;
    cursor: pointer;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .progress-buf {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    background: rgba(139,92,246,0.2);
    border-radius: 99px;
    transition: width 0.4s linear;
  }
  .progress-fill {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    background: linear-gradient(90deg, #6d28d9, #8b5cf6, #a78bfa);
    border-radius: 99px;
    transition: width 0.25s linear;
    box-shadow: 0 0 8px rgba(139,92,246,0.6);
  }
  .progress-wrap:hover .progress-fill { box-shadow: 0 0 14px rgba(139,92,246,0.9); }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    color: var(--text-muted);
    margin-bottom: 12px;
    font-variant-numeric: tabular-nums;
  }

  /* Volume */
  .vol-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .vol-icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .vol-icon-btn:hover { transform: scale(1.15); }
  .vol-icon-btn svg { width: 17px; height: 17px; }

  .vol-slider-wrap {
    flex: 1;
    position: relative;
    height: 5px;
    background: var(--gray);
    border-radius: 99px;
    cursor: pointer;
  }
  .vol-fill {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    background: linear-gradient(90deg, #6d28d9, #8b5cf6);
    border-radius: 99px;
    pointer-events: none;
    box-shadow: 0 0 6px rgba(139,92,246,0.4);
  }
  .vol-thumb {
    position: absolute;
    top: 50%;
    width: 13px;
    height: 13px;
    background: #a78bfa;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    pointer-events: none;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    box-shadow: 0 0 6px rgba(139,92,246,0.5);
  }
  .vol-slider-wrap:hover .vol-thumb {
    transform: translate(-50%, -50%) scale(1.15);
    box-shadow: 0 0 12px rgba(139,92,246,0.7);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 520px) {
    .card { padding: 28px 20px 22px; }
    .name { font-size: 1.3rem; }
    .tech-icon { width: 44px; height: 44px; }
    .tech-icon svg { width: 22px; height: 22px; }
  }
</style>
</head>
<body>

<!-- Corner glows -->
<div class="corner-glow tl"></div>
<div class="corner-glow br"></div>

<!-- Animated canvas bg -->
<canvas id="bg-canvas"></canvas>

<!-- Bicycle silhouette -->
<svg class="bike-bg" viewBox="0 0 200 120" fill="none" xmlns="http://www.w3.org/2000/svg">

  <line x1="48" y1="82" x2="100" y2="42" stroke="#8b5cf6" stroke-width="5" stroke-linecap="round"/>

  <!-- Spokes rear -->
  <line x1="48" y1="48" x2="48" y2="82" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="14" y1="82" x2="48" y2="82" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.6"/>

  <line x1="152" y1="48" x2="152" y2="82" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="118" y1="82" x2="152" y2="82" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="126" y1="56" x2="152" y2="82" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="126" y1="108" x2="152" y2="82" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.6"/>
</svg>

<!-- Page -->
<div class="page">
  <div class="card">

    <!-- HEADER -->
    <div class="header">
      <div class="avatar-wrap">
        <div class="avatar-ring"></div>
        <div class="avatar-inner">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTZxKKCaSkv42HgK1TdoCCmg08OyO2G8-qs9g&s" alt="Oste"/>
        </div>
      </div>
      <div>
        <div class="name">Oste</div>
        <div class="subtitle">Software Engineer</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- TECH STACK -->
    <div class="stack-label">Tech Stack</div>
    <div class="stack">

      <!-- Python -->

      <!-- CSS3 -->

      </div>

      <!-- JavaScript -->
      <div class="tech-icon" title="JavaScript">

<script>
/* ─── CANVAS BACKGROUND ─── */
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, t = 0;

  const particles = Array.from({length:38}, () => ({
    x: Math.random(), y: Math.random(),
    vx: (Math.random()-0.5)*0.00018,
    vy: (Math.random()-0.5)*0.00018,
    r: Math.random()*1.6+0.4,
    a: Math.random()*0.35+0.05
  }));

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function draw() {
    t += 0.003;

    /* wave gradient bg */
    const grd = ctx.createLinearGradient(0,0,W,H);
    const s1 = 0.5 + 0.5*Math.sin(t*0.7);
    const s2 = 0.5 + 0.5*Math.sin(t*0.5 + 2);
    grd.addColorStop(0,   `rgb(0,0,0)`);
    grd.addColorStop(s1*0.55, `rgb(${Math.round(14+s1*12)},${Math.round(4+s1*8)},${Math.round(30+s1*22)})`);
    grd.addColorStop(s2*0.9,  `rgb(${Math.round(8+s2*8)},${Math.round(8+s2*6)},${Math.round(18+s2*14)})`);
    grd.addColorStop(1,   `rgb(0,0,0)`);
    ctx.fillStyle = grd;
    ctx.fillRect(0,0,W,H);

    /* particles */
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x<0) p.x=1; if(p.x>1) p.x=0;
      if(p.y<0) p.y=1; if(p.y>1) p.y=0;
      ctx.beginPath();
      ctx.arc(p.x*W, p.y*H, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(139,92,246,${p.a})`;
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

/* ─── AUDIO PLAYER ─── */
(function() {
  const audio      = document.getElementById('audio');
  const playBtn    = document.getElementById('playBtn');
  const iconPlay   = document.getElementById('iconPlay');
  const iconPause  = document.getElementById('iconPause');
  const progWrap   = document.getElementById('progressWrap');
  const progBuf    = document.getElementById('progressBuf');
  const progFill   = document.getElementById('progressFill');
  const timeCur    = document.getElementById('timeCur');
  const timeDur    = document.getElementById('timeDur');
  const volWrap    = document.getElementById('volWrap');
  const volFill    = document.getElementById('volFill');
  const volThumb   = document.getElementById('volThumb');
  const volBtn     = document.getElementById('volBtn');
  const volIcon    = document.getElementById('volIcon');

  let vol = 0.8, muted = false, prevVol = 0.8;
  audio.volume = vol;

  function fmt(s) {
    s = Math.floor(s||0);
    return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
  }

  /* Play/Pause */
  playBtn.addEventListener('click', () => {
    if(audio.paused) {
      audio.play();
      iconPlay.style.display  = 'none';
      iconPause.style.display = 'block';
      playBtn.classList.add('playing');
    } else {
      audio.pause();
      iconPlay.style.display  = 'block';
      iconPause.style.display = 'none';
      playBtn.classList.remove('playing');
    }
  });

  audio.addEventListener('timeupdate', () => {
    const pct = audio.duration ? (audio.currentTime / audio.duration)*100 : 0;
    progFill.style.width = pct + '%';
    timeCur.textContent  = fmt(audio.currentTime);
  });

  audio.addEventListener('durationchange', () => {
    timeDur.textContent = fmt(audio.duration);
  });

  audio.addEventListener('progress', () => {
    if(audio.duration && audio.buffered.length) {
      const buf = (audio.buffered.end(audio.buffered.length-1) / audio.duration)*100;
      progBuf.style.width = buf + '%';
    }
  });

  audio.addEventListener('ended', () => {
    iconPlay.style.display  = 'block';
    iconPause.style.display = 'none';
    playBtn.classList.remove('playing');
    progFill.style.width = '0%';
    timeCur.textContent  = '0:00';
  });

  /* Seek */
  let seekDrag = false;
  function doSeek(e) {
    const r   = progWrap.getBoundingClientRect();
    const pct = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width));
    if(audio.duration) audio.currentTime = pct * audio.duration;
  }
  progWrap.addEventListener('mousedown', e => { seekDrag=true; doSeek(e); });
  window.addEventListener('mousemove',  e => { if(seekDrag) doSeek(e); });
  window.addEventListener('mouseup',    () => { seekDrag=false; });
  progWrap.addEventListener('touchstart', e => { doSeek(e.touches[0]); }, {passive:true});
  progWrap.addEventListener('touchmove',  e => { doSeek(e.touches[0]); }, {passive:true});

  /* Volume */
  function setVol(v) {
    vol = Math.min(1, Math.max(0, v));
    audio.volume = muted ? 0 : vol;
    volFill.style.width  = (vol*100) + '%';
    volThumb.style.left  = (vol*100) + '%';
    updateVolIcon();
  }
  function updateVolIcon() {
    const v = muted ? 0 : vol;
    if(v === 0) {
      volIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>`;
    } else if(v < 0.4) {
      volIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>`;
    } else {
      volIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>`;
    }
  }

  let volDrag = false;
  function doVol(e) {
    const r   = volWrap.getBoundingClientRect();
    const pct = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width));
    muted = false; prevVol = pct;
    setVol(pct);
  }
  volWrap.addEventListener('mousedown', e => { volDrag=true; doVol(e); });
  window.addEventListener('mousemove',  e => { if(volDrag) doVol(e); });
  window.addEventListener('mouseup',    () => { volDrag=false; });
  volWrap.addEventListener('touchstart', e => { doVol(e.touches[0]); }, {passive:true});
  volWrap.addEventListener('touchmove',  e => { doVol(e.touches[0]); }, {passive:true});

  volBtn.addEventListener('click', () => {
    muted = !muted;
    audio.volume = muted ? 0 : vol;
    if(muted) { prevVol=vol; }
    else { vol = prevVol||0.8; audio.volume=vol; }
    volFill.style.width  = (muted?0:vol*100)+'%';
    volThumb.style.left  = (muted?0:vol*100)+'%';
    updateVolIcon();
  });

  setVol(0.8);
})();
</script>
