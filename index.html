<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Oste · software engineer</title>
  <!-- Google Font Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    /* ----- RESET / GLOBAL ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background-color: #000000;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      position: relative;
      overflow-x: hidden;
      color: #ffffff;
    }

    /* subtle animated dark gradient wave */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(30,35,50,0.3) 0%, transparent 35%),
                  radial-gradient(circle at 80% 70%, rgba(15,25,40,0.4) 0%, transparent 40%),
                  repeating-linear-gradient(45deg, rgba(255,255,255,0.002) 0px, rgba(255,255,255,0.002) 2px, transparent 2px, transparent 10px);
      animation: slowDrift 32s infinite alternate ease-in-out;
      z-index: -2;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 20% 30%, rgba(5,15,25,0.3) 0%, transparent 55%);
      z-index: -1;
      pointer-events: none;
    }

    @keyframes slowDrift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-3.5%, -2%) scale(1.01); }
    }

    /* ----- MAIN CARD (glass) ----- */
    .card {
      max-width: 660px;
      width: 100%;
      background: rgba(8, 8, 12, 0.6);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: 0 25px 45px -15px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
      padding: 2.2rem 2rem;
      transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.4s;
      animation: fadeGlide 1s ease-out;
    }

    .card:hover {
      transform: scale(1.01);
      box-shadow: 0 30px 55px -18px black, 0 0 0 1px rgba(255, 255, 255, 0.07) inset;
    }

    @keyframes fadeGlide {
      0% { opacity: 0; transform: translateY(12px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ----- PROFILE ----- */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .avatar {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.8px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 15px 25px -12px black, 0 0 25px rgba(100,160,255,0.2);
      transition: box-shadow 0.3s;
      margin-bottom: 1.2rem;
    }

    .avatar:hover {
      box-shadow: 0 0 0 2px rgba(255,255,255,0.15), 0 18px 30px -10px black, 0 0 35px rgba(140,190,255,0.3);
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 480;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: white;
    }

    .sub {
      font-size: 1.05rem;
      font-weight: 360;
      color: rgba(210, 210, 225, 0.8);
      margin-top: 0.25rem;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: rgba(255, 255, 255, 0.12);
      margin: 1.5rem auto 1.8rem auto;
      border-radius: 3px;
    }

    /* ----- TECH STACK (plates + color icons) ----- */
    .tech-section {
      margin-bottom: 2.2rem;
    }

    .tech-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.6px;
      font-weight: 400;
      color: rgba(190, 190, 205, 0.7);
      margin-bottom: 1.2rem;
    }

    .tech-icons {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      align-items: center;
      justify-content: center;
    }

    .tech-icon {
      width: 56px;
      height: 56px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(20, 20, 28, 0.6);
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 8px 12px -8px black;
      transition: transform 0.35s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.3s, background 0.2s;
      will-change: transform;
    }

    .tech-icon:hover {
      transform: translateY(-5px) scale(1.05);
      background: rgba(28, 28, 38, 0.8);
      box-shadow: 0 12px 20px -12px black, 0 0 12px rgba(140, 180, 255, 0.3);
    }

    .tech-icon svg {
      width: 42px;
      height: 42px;
      display: block;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
      transition: filter 0.2s;
    }

    .tech-icon:hover svg {
      filter: drop-shadow(0 4px 8px rgba(255,255,255,0.15));
    }

    /* ----- animated motto (pipe + sliding) ----- */
    .motto-wrapper {
      margin: 1.8rem 0 2.2rem 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 340;
      color: rgba(220, 220, 240, 0.9);
      border-top: 1px solid rgba(255,255,255,0.03);
      padding-top: 1.6rem;
    }

    .pipe {
      color: rgba(160, 160, 180, 0.7);
      font-weight: 300;
      font-size: 1.4rem;
      line-height: 1;
    }

    .animated-text-container {
      overflow: hidden;
      height: 2rem;
      display: flex;
      align-items: center;
    }

    .scrolling-motto {
      animation: slideFade 6s infinite cubic-bezier(0.65, 0, 0.35, 1);
      white-space: nowrap;
      padding-right: 0.5rem;
    }

    @keyframes slideFade {
      0% { opacity: 0; transform: translateX(-35px); }
      10% { opacity: 1; transform: translateX(0); }
      40% { opacity: 1; transform: translateX(0); }
      55% { opacity: 0; transform: translateX(35px); }
      100% { opacity: 0; transform: translateX(35px); }
    }

    /* ----- PREMIUM AUDIO PLAYER (high-end) ----- */
    .player-section {
      background: rgba(5, 5, 10, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 30px;
      padding: 1.7rem 1.6rem 1.6rem 1.6rem;
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.7), 0 12px 25px -18px black;
    }

    .track-info {
      width: 100%;
    }

    .track-title {
      font-size: 1.25rem;
      font-weight: 520;
      letter-spacing: -0.3px;
      color: white;
      line-height: 1.3;
    }

    .track-artist {
      font-size: 0.8rem;
      color: rgba(190, 190, 210, 0.75);
      margin-top: 4px;
      font-weight: 350;
    }

    /* progress + buffer */
    .progress-container {
      width: 100%;
      margin: 1.5rem 0 0.9rem 0;
    }

    .progress-bar-wrapper {
      position: relative;
      width: 100%;
      height: 5px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 30px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.02);
      overflow: hidden;
      box-shadow: inset 0 1px 4px black;
    }

    .buffer-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: rgba(200, 210, 240, 0.2);
      border-radius: 30px;
      width: 0%;
      transition: width 0.1s linear;
      pointer-events: none;
    }

    .progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, #b0b8ff, #d6e0ff);
      border-radius: 30px;
      width: 0%;
      box-shadow: 0 0 12px #9ab0ff;
      transition: width 0.08s ease-out;
      pointer-events: none;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      font-weight: 370;
      color: rgba(210, 210, 225, 0.8);
      margin-top: 8px;
      letter-spacing: 0.2px;
    }

    /* controls row */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.4rem;
    }

    /* premium volume with speaker icon */
    .volume-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 150px;
    }

    .speaker-icon {
      width: 24px;
      height: 24px;
      color: rgba(220, 220, 240, 0.9);
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .speaker-icon svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .custom-volume {
      position: relative;
      width: 100px;
      height: 6px;
    }

    .volume-track {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 20px;
      box-shadow: inset 0 1px 6px black;
      position: relative;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.02);
    }

    .volume-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 60%;
      background: linear-gradient(90deg, #b0b8ff, #d0dcff);
      border-radius: 20px;
      box-shadow: 0 0 8px #adc0ff;
      pointer-events: none;
      transition: width 0.05s linear;
    }

    .volume-thumb {
      position: absolute;
      top: 50%;
      left: 60%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 12px #d0e0ff, 0 2px 8px black;
      border: 1px solid rgba(255,255,255,0.3);
      pointer-events: none;
      transition: left 0.05s linear, box-shadow 0.2s, transform 0.15s;
    }

    .volume-track:hover ~ .volume-fill + .volume-thumb,
    .volume-wrapper:hover .volume-thumb {
      box-shadow: 0 0 16px #ffffff, 0 0 25px #aac0ff;
      transform: translate(-50%, -50%) scale(1.15);
    }

    /* play button */
    .play-wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .play-pause-btn {
      background: rgba(15, 15, 22, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      width: 62px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
      color: white;
      box-shadow: 0 10px 16px -10px black, 0 0 0 1px rgba(255,255,255,0.05) inset;
      backdrop-filter: blur(8px);
    }

    .play-pause-btn:hover {
      transform: scale(1.07);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 12px 22px -12px black, 0 0 18px rgba(160, 190, 255, 0.5);
    }

    .play-pause-btn:active {
      transform: scale(0.98);
    }

    .play-pause-btn svg {
      width: 34px;
      height: 34px;
      fill: currentColor;
      transition: transform 0.2s, filter 0.2s;
    }

    .play-pause-btn.playing {
      box-shadow: 0 0 20px #a0b4ff, 0 10px 18px -10px black;
    }

    .play-pause-btn.playing svg {
      filter: drop-shadow(0 0 10px #c0d0ff);
    }

    .audio-element {
      display: none;
    }

    .footer-note {
      margin-top: 2rem;
      font-size: 0.6rem;
      text-align: center;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.5px;
    }

    /* responsive */
    @media (max-width: 520px) {
      .card { padding: 1.8rem 1.4rem; }
      .volume-wrapper { width: 120px; }
      .custom-volume { width: 70px; }
      .play-pause-btn { width: 54px; height: 54px; }
      .play-pause-btn svg { width: 30px; height: 30px; }
    }
    @media (max-width: 400px) {
      .volume-wrapper { width: 100px; }
      .custom-volume { width: 50px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- profile -->
    <div class="profile">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTZxKKCaSkv42HgK1TdoCCmg08OyO2G8-qs9g&s" alt="Oste" class="avatar" loading="lazy">
      <h1>Oste</h1>
      <div class="sub">Software Engineer</div>
      <div class="divider"></div>
    </div>

    <!-- tech stack -->
    <div class="tech-section">
      <div class="tech-label">engineer stack</div>
      <div class="tech-icons">
        <!-- Python -->
        <span class="tech-icon"><svg viewBox="0 0 32 32"><path d="M16 2C9.9 2 9 5.4 9 8.2V12H21V14H7C4.2 14 2 16.2 2 19V26C2 28.8 4.2 31 7 31H13C15.8 31 16 28.8 16 26V24H9V22H20C22.8 22 23 20.6 23 18V8C23 5.2 22.1 2 16 2ZM13 5C14.1 5 15 5.9 15 7C15 8.1 14.1 9 13 9C11.9 9 11 8.1 11 7C11 5.9 11.9 5 13 5Z" fill="#3776AB"/><path d="M16 30C22.1 30 23 26.6 23 23.8V20H11V18H25C27.8 18 30 15.8 30 13V6C30 3.2 27.8 1 25 1H19C16.2 1 16 3.2 16 6V8H23V10H10C7.2 10 6 12.2 6 15V22C6 24.8 7.9 30 16 30ZM19 27C17.9 27 17 26.1 17 25C17 23.9 17.9 23 19 23C20.1 23 21 23.9 21 25C21 26.1 20.1 27 19 27Z" fill="#FFD43B"/></svg></span>
        <!-- HTML5 -->
        <span class="tech-icon"><svg viewBox="0 0 32 32"><path fill="#E44D26" d="M6 28L4 3h24l-2 25-10 3-10-3z"/><path fill="#F16529" d="M26 5H16v24.5l8-2.5 2-22zM16 13h4l-0.5 4H16v4h5l-1 7-4 1v4l6-2 1-11H16z"/><path fill="#fff" d="M16 13v4h-5l-0.5-4H16zm0 10v-4h-4l0.5 4 3.5 1z"/></svg></span>
        <!-- CSS3 -->
        <span class="tech-icon"><svg viewBox="0 0 32 32"><path fill="#264DE4" d="M6 28L4 3h24l-2 25-10 3-10-3z"/><path fill="#2965F1" d="M26 5H16v24.5l8-2.5 2-22zM16 13h4l-0.5 4H16v4h5l-1 7-4 1v4l6-2 1-11H16z"/><path fill="#EBEBEB" d="M16 13v4h-5l-0.5-4H16zm0 10v-4h-4l0.5 4 3.5 1zM11.5 9H16v4h-4.5z"/></svg></span>
        <!-- JavaScript -->
        <span class="tech-icon"><svg viewBox="0 0 32 32"><path fill="#F7DF1E" d="M2 2h28v28H2z"/><path fill="#000001" d="M20.8 24c0.4 0.7 1 1.2 1.9 1.2 0.8 0 1.3-0.4 1.3-1 0-0.7-0.5-0.9-1.4-1.3l-0.5-0.2c-1.4-0.6-2.3-1.4-2.3-3 0-1.5 1.1-2.6 2.9-2.6 1.3 0 2.2 0.5 2.9 1.6l-1.6 1c-0.3-0.6-0.7-0.9-1.3-0.9-0.6 0-1 0.4-1 0.9 0 0.6 0.4 0.9 1.3 1.2l0.5 0.2c1.7 0.8 2.7 1.6 2.7 3.3 0 1.9-1.5 3-3.5 3-2 0-3.2-0.9-3.8-2.2zm-9.1 0.1c0.3 0.5 0.6 0.9 1.2 0.9 0.5 0 0.8-0.2 0.8-1v-5.4h1.9v5.4c0 1.8-1 2.6-2.4 2.6-1.3 0-2-0.7-2.4-1.5z"/></svg></span>
        <!-- C++ -->
        <span class="tech-icon"><svg viewBox="0 0 32 32"><path fill="#00599C" d="M18.1 2L6 8.5v15L18.1 30l12-6.5v-15L18.1 2z"/><path fill="#004482" d="M18.1 2L6 8.5v15L18.1 30l2.5-1.3-11-6 8.5-4.7 2.5-1.3v-2.7l-2.5 1.3-8.5 4.7 2.5-1.3 8.5-4.7 2.5-1.3v-2.7l-2.5 1.3-8.5 4.7v-5.4l6-3.2z"/><path fill="#fff" d="M24 13.5v2h-2v2h2v2h2v-2h2v-2h-2v-2h-2zm-9 0v2h-2v2h2v2h2v-2h2v-2h-2v-2h-2z"/></svg></span>
      </div>
    </div>

    <!-- animated motto -->
    <div class="motto-wrapper">
      <span class="pipe">|</span>
      <div class="animated-text-container">
        <span class="scrolling-motto">Bir Umuttur Kodlamak</span>
      </div>
    </div>

    <!-- PROFESSIONAL MUSIC PLAYER (with Rza Tamer track) -->
    <div class="player-section">
      <div class="track-info">
        <div class="track-title">Benden Sonra</div>
        <div class="track-artist">Rza Tamer</div>
      </div>

      <!-- progress + buffer -->
      <div class="progress-container">
        <div class="progress-bar-wrapper" id="progressBar">
          <div class="buffer-bar" id="bufferBar"></div>
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="totalTime">4:12</span>
        </div>
      </div>

      <!-- controls: volume (with speaker) + play -->
      <div class="controls-row">
        <div class="volume-wrapper" id="volumeWrapper">
          <div class="speaker-icon" id="speakerIcon">
            <svg viewBox="0 0 24 24">
              <path d="M3 9v6h4l5 5V4L7 9H3z" />
            </svg>
          </div>
          <div class="custom-volume">
            <div class="volume-track" id="volumeTrack"></div>
            <div class="volume-fill" id="volumeFill" style="width: 60%;"></div>
            <div class="volume-thumb" id="volumeThumb" style="left: 60%;"></div>
          </div>
        </div>
        <div class="play-wrapper">
          <div class="play-pause-btn" id="playPauseBtn">
            <svg viewBox="0 0 24 24">
              <path id="playIcon" d="M8 5v14l11-7z" fill="currentColor" />
            </svg>
          </div>
        </div>
        <div style="width: 40px;"></div> <!-- spacer -->
      </div>

      <audio id="audioPlayer" preload="metadata" loop crossorigin="anonymous">
        <source src="https://raw.githubusercontent.com/ForsDev101/osste/main/Rza%20Tamer%20-%20Benden%20Sonra.mp3" type="audio/mpeg">
      </audio>
    </div>
    <div class="footer-note">⎔ engineering precision</div>
  </div>

  <script>
    (function() {
      const audio = document.getElementById('audioPlayer');
      const playBtn = document.getElementById('playPauseBtn');
      const playIcon = document.getElementById('playIcon');
      const progressFill = document.getElementById('progressFill');
      const bufferBar = document.getElementById('bufferBar');
      const currentSpan = document.getElementById('currentTime');
      const totalSpan = document.getElementById('totalTime');
      const progressBar = document.getElementById('progressBar');
      const speakerIcon = document.getElementById('speakerIcon');

      // volume elements
      const volumeTrack = document.getElementById('volumeTrack');
      const volumeFill = document.getElementById('volumeFill');
      const volumeThumb = document.getElementById('volumeThumb');

      // default volume
      audio.volume = 0.6;
      let vol = 0.6;
      let isMuted = false;
      let prevVolume = 0.6;

      function formatTime(secs) {
        if (isNaN(secs) || !isFinite(secs)) return "0:00";
        const m = Math.floor(secs / 60);
        const s = Math.floor(secs % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
      }

      // metadata
      audio.addEventListener('loadedmetadata', () => {
        totalSpan.textContent = formatTime(audio.duration);
      });
      if (audio.readyState >= 1) totalSpan.textContent = formatTime(audio.duration);

      // timeupdate
      audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
          const percent = (audio.currentTime / audio.duration) * 100;
          progressFill.style.width = percent + '%';
          currentSpan.textContent = formatTime(audio.currentTime);
        }
      });

      // simulate buffer (premium effect)
      setInterval(() => {
        if (audio.duration && audio.buffered.length > 0) {
          const bufferedEnd = audio.buffered.end(audio.buffered.length - 1);
          const percent = (bufferedEnd / audio.duration) * 100;
          bufferBar.style.width = percent + '%';
        } else {
          const current = parseFloat(progressFill.style.width) || 0;
          const fakeBuffer = Math.min(100, current + 20 + Math.random() * 15);
          bufferBar.style.width = fakeBuffer + '%';
        }
      }, 900);

      // seek
      progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const width = rect.width;
        let percent = clickX / width;
        percent = Math.min(1, Math.max(0, percent));
        if (audio.duration) audio.currentTime = percent * audio.duration;
      });

      // play/pause
      playBtn.addEventListener('click', () => {
        if (audio.paused) {
          audio.play();
          playIcon.setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'); // pause
          playBtn.classList.add('playing');
        } else {
          audio.pause();
          playIcon.setAttribute('d', 'M8 5v14l11-7z'); // play
          playBtn.classList.remove('playing');
        }
      });

      // custom volume + speaker icon update
      function updateVolumeIcon() {
        const v = audio.volume;
        const speakerPath = speakerIcon.querySelector('svg path');
        if (v === 0 || audio.muted) {
          speakerPath.setAttribute('d', 'M3 9v6h4l5 5V4L7 9H3zm13 3c0-1.5-.8-2.8-2-3.4v6.8c1.2-.6 2-1.9 2-3.4z' +
            'M16 3c-2.2 0-4 1.8-4 4s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4z' +
            'M20 3c2.8 0 5 2.2 5 5s-2.2 5-5 5-5-2.2-5-5 2.2-5 5-5z' +
            'M20 1c-3.9 0-7 3.1-7 7s3.1 7 7 7 7-3.1 7-7-3.1-7-7-7z');
        } else if (v < 0.33) {
          speakerPath.setAttribute('d', 'M3 9v6h4l5 5V4L7 9H3zm13 0v6c1.1 0 2-.9 2-2s-.9-2-2-2z');
        } else if (v < 0.66) {
          speakerPath.setAttribute('d', 'M3 9v6h4l5 5V4L7 9H3zm13 3c0-1.5-.8-2.8-2-3.4v6.8c1.2-.6 2-1.9 2-3.4z');
        } else {
          speakerPath.setAttribute('d', 'M3 9v6h4l5 5V4L7 9H3zm13 0v6c1.7 0 3-1.3 3-3s-1.3-3-3-3z' +
            'M16 3c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5z');
        }
      }

      function setVolumeFromEvent(e) {
        const rect = volumeTrack.getBoundingClientRect();
        let x = e.clientX - rect.left;
        x = Math.min(rect.width, Math.max(0, x));
        let percent = x / rect.width;
        percent = Math.min(1, Math.max(0, percent));
        audio.volume = percent;
        vol = percent;
        audio.muted = false;
        volumeFill.style.width = (percent * 100) + '%';
        volumeThumb.style.left = (percent * 100) + '%';
        updateVolumeIcon();
      }

      volumeTrack.addEventListener('click', setVolumeFromEvent);

      let dragging = false;
      volumeTrack.addEventListener('mousedown', (e) => {
        dragging = true;
        setVolumeFromEvent(e);
      });
      window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        setVolumeFromEvent(e);
      });
      window.addEventListener('mouseup', () => dragging = false);

      // speaker icon click to mute/unmute
      speakerIcon.addEventListener('click', () => {
        if (audio.muted) {
          audio.muted = false;
          audio.volume = prevVolume || 0.6;
        } else {
          prevVolume = audio.volume;
          audio.muted = true;
          audio.volume = 0;
        }
        volumeFill.style.width = (audio.volume * 100) + '%';
        volumeThumb.style.left = (audio.volume * 100) + '%';
        updateVolumeIcon();
      });

      audio.addEventListener('volumechange', updateVolumeIcon);
      updateVolumeIcon();

      // initial
      volumeFill.style.width = '60%';
      volumeThumb.style.left = '60%';
    })();
  </script>
</body>
</html>
